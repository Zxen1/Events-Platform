<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Map Viz Picker — Zoom 0–7</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f0f12; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 30px 20px; }
  h1 { font-size: 18px; font-weight: 600; color: #fff; margin-bottom: 6px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 30px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
  .card {
    background: #1a1a22;
    border: 2px solid #2a2a38;
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.1s;
  }
  .card:hover { border-color: #555; transform: translateY(-1px); }
  .card.selected { border-color: #4f8ef7; }
  .card-canvas { display: block; width: 100%; height: 190px; }
  .card-body { padding: 14px 16px 16px; }
  .card-title { font-size: 15px; font-weight: 600; color: #fff; margin-bottom: 5px; }
  .card-desc { font-size: 12px; color: #999; line-height: 1.6; margin-bottom: 10px; }
  .tags { display: flex; flex-wrap: wrap; gap: 5px; }
  .tag {
    font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500;
  }
  .tag-green { background: #1a3a22; color: #5cba7a; }
  .tag-orange { background: #3a2a14; color: #c9833a; }
  .tag-blue { background: #142040; color: #4f8ef7; }
  .tag-red { background: #3a1a1a; color: #d96060; }
  .note { margin-top: 24px; font-size: 12px; color: #666; text-align: center; }
  .selected-label {
    display: none; margin-top: 20px; padding: 12px 16px;
    background: #142040; border: 1px solid #4f8ef7; border-radius: 8px;
    font-size: 13px; color: #7ab4ff;
  }
  .selected-label.visible { display: block; }
</style>
</head>
<body>

<h1>Map Visualization Options — Zoom 0 to 7</h1>
<p class="subtitle">Click a style to select it. These are all available as native Mapbox GL JS layer types (v3.17.0).</p>

<div class="grid" id="grid"></div>

<div class="selected-label" id="selectedLabel"></div>
<p class="note">All options use the same server data (get-clusters endpoint). No extra libraries needed.</p>

<script>
const options = [
  {
    id: 'heatmap',
    title: 'Heatmap',
    desc: 'Smooth colour gradient showing where events are densest. Cool blue → warm yellow → hot red. Fades in/out automatically at the zoom boundary.',
    tags: [
      { label: 'Visual impact: high', cls: 'tag-green' },
      { label: 'No click interaction', cls: 'tag-orange' },
      { label: 'Native Mapbox', cls: 'tag-blue' },
    ],
    draw: drawHeatmap
  },
  {
    id: 'bubbles',
    title: 'Proportional Bubbles',
    desc: 'Circles scaled by event count. More events = bigger circle. Can show count labels inside. Clickable to zoom in.',
    tags: [
      { label: 'Clickable', cls: 'tag-green' },
      { label: 'Shows exact counts', cls: 'tag-green' },
      { label: 'Native Mapbox', cls: 'tag-blue' },
    ],
    draw: drawBubbles
  },
  {
    id: 'heatmap_bubbles',
    title: 'Heatmap + Bubble Overlay',
    desc: 'Heatmap in the background for density, with proportional bubble circles on top for count readability. Best of both worlds.',
    tags: [
      { label: 'Best visual clarity', cls: 'tag-green' },
      { label: 'Clickable bubbles', cls: 'tag-green' },
      { label: 'Two layers', cls: 'tag-blue' },
    ],
    draw: drawHeatmapBubbles
  },
  {
    id: 'choropleth',
    title: 'Choropleth (Country Fill)',
    desc: 'Countries filled with a colour based on event count. Requires country-level aggregation from the server.',
    tags: [
      { label: 'Geographic clarity', cls: 'tag-green' },
      { label: 'Needs country grouping', cls: 'tag-orange' },
      { label: 'Server change needed', cls: 'tag-red' },
    ],
    draw: drawChoropleth
  },
  {
    id: 'current',
    title: 'Current: Balloon Icons',
    desc: 'Your existing design — balloon icons stamped with a count number. Renders from zoom 0 upward using server-side grid buckets.',
    tags: [
      { label: 'Already built', cls: 'tag-green' },
      { label: 'Clickable', cls: 'tag-green' },
      { label: 'Icon-heavy at low zoom', cls: 'tag-orange' },
    ],
    draw: drawBalloons
  },
  {
    id: 'dots',
    title: 'Dot Density',
    desc: 'One small dot per post location. Works well at zoom 4–7 when posts are spread out. Can become noisy at zoom 0–3.',
    tags: [
      { label: 'Simple', cls: 'tag-green' },
      { label: 'Gets cluttered at low zoom', cls: 'tag-orange' },
      { label: 'Native Mapbox', cls: 'tag-blue' },
    ],
    draw: drawDots
  }
];

// ─── DRAW FUNCTIONS ──────────────────────────────────────────────────────────

function mapBg(ctx, w, h) {
  // Dark map background
  ctx.fillStyle = '#1a2535';
  ctx.fillRect(0, 0, w, h);
  // Subtle grid lines (lat/lng grid illusion)
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (let x = 0; x < w; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke(); }
  for (let y = 0; y < h; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke(); }
  // Faint land-mass silhouettes
  ctx.fillStyle = 'rgba(255,255,255,0.05)';
  [[30,60,120,50],[160,50,100,60],[80,100,80,40],[210,80,60,35],[40,130,30,20]].forEach(([x,y,rx,ry]) => {
    ctx.beginPath(); ctx.ellipse(x,y,rx,ry,0,0,Math.PI*2); ctx.fill();
  });
}

function drawHeatmap(ctx, w, h) {
  mapBg(ctx, w, h);
  const points = [
    [80,55,80],[160,55,90],[230,75,50],[45,90,40],[130,105,60],[190,120,45],[270,90,30],[110,70,55],[350,80,25]
  ];
  points.forEach(([x,y,r]) => {
    const g = ctx.createRadialGradient(x,y,0,x,y,r*1.5);
    g.addColorStop(0,'rgba(255,60,0,0.65)');
    g.addColorStop(0.35,'rgba(255,165,0,0.45)');
    g.addColorStop(0.65,'rgba(100,200,80,0.25)');
    g.addColorStop(1,'rgba(0,100,255,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(x,y,r*1.5,0,Math.PI*2); ctx.fill();
  });
}

function drawBubbles(ctx, w, h) {
  mapBg(ctx, w, h);
  const pts = [[80,55,28,'2.4k'],[160,55,36,'5.1k'],[230,75,20,'820'],[45,90,15,'310'],[130,105,24,'1.7k'],[190,120,18,'650'],[270,90,12,'180'],[110,70,22,'1.2k']];
  pts.forEach(([x,y,r,label]) => {
    ctx.beginPath();
    ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle='rgba(79,142,247,0.35)';
    ctx.fill();
    ctx.strokeStyle='rgba(79,142,247,0.9)';
    ctx.lineWidth=1.5;
    ctx.stroke();
    ctx.fillStyle='#fff';
    ctx.font=`bold ${Math.max(9, r*0.55)}px sans-serif`;
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(label,x,y);
  });
}

function drawHeatmapBubbles(ctx, w, h) {
  mapBg(ctx, w, h);
  // Heatmap layer
  const hpts = [[80,55,70],[160,55,85],[230,75,45],[45,90,35],[130,105,55],[190,120,40],[270,90,28]];
  hpts.forEach(([x,y,r]) => {
    const g = ctx.createRadialGradient(x,y,0,x,y,r*1.4);
    g.addColorStop(0,'rgba(255,60,0,0.5)');
    g.addColorStop(0.4,'rgba(255,165,0,0.3)');
    g.addColorStop(0.75,'rgba(100,200,80,0.15)');
    g.addColorStop(1,'rgba(0,100,255,0)');
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.arc(x,y,r*1.4,0,Math.PI*2); ctx.fill();
  });
  // Bubble layer on top
  const bpts = [[80,55,18,'2.4k'],[160,55,24,'5.1k'],[230,75,13,'820'],[130,105,16,'1.7k'],[190,120,12,'650']];
  bpts.forEach(([x,y,r,label]) => {
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.15)'; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.8)'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.fillStyle='#fff';
    ctx.font=`bold ${Math.max(8,r*0.55)}px sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(label,x,y);
  });
}

function drawChoropleth(ctx, w, h) {
  ctx.fillStyle='#1a2535'; ctx.fillRect(0,0,w,h);
  const regions=[
    [[20,30,140,30,160,80,130,110,60,100,20,70],0.7],
    [[170,20,270,25,280,75,250,100,180,90,165,55],0.9],
    [[50,115,130,110,120,155,40,145],0.4],
    [[185,100,250,95,260,140,200,150],0.6],
    [[270,80,340,85,330,130,275,125],0.25],
    [[30,150,100,148,95,175,25,170],0.15],
  ];
  regions.forEach(([pts,density]) => {
    ctx.beginPath();
    ctx.moveTo(pts[0],pts[1]);
    for(let i=2;i<pts.length;i+=2) ctx.lineTo(pts[i],pts[i+1]);
    ctx.closePath();
    const r=Math.round(255*density*0.9);
    const g=Math.round(100*(1-density));
    ctx.fillStyle=`rgba(${r},${g},50,0.7)`;
    ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.lineWidth=1; ctx.stroke();
  });
  // Legend
  const lg=ctx.createLinearGradient(20,170,160,170);
  lg.addColorStop(0,'rgba(50,100,50,0.8)'); lg.addColorStop(1,'rgba(230,50,50,0.8)');
  ctx.fillStyle=lg; ctx.fillRect(20,172,140,8);
  ctx.fillStyle='#aaa'; ctx.font='10px sans-serif'; ctx.textAlign='left'; ctx.fillText('Low',20,192);
  ctx.textAlign='right'; ctx.fillText('High',160,192);
}

function drawBalloons(ctx, w, h) {
  mapBg(ctx, w, h);
  function balloon(x,y,r,label) {
    // Circle body
    ctx.beginPath(); ctx.arc(x,y-r*0.3,r,0,Math.PI*2);
    ctx.fillStyle='#c0392b'; ctx.fill();
    ctx.strokeStyle='#7b241c'; ctx.lineWidth=1.5; ctx.stroke();
    // Point
    ctx.beginPath(); ctx.moveTo(x-r*0.35,y+r*0.5); ctx.lineTo(x,y+r*1.3); ctx.lineTo(x+r*0.35,y+r*0.5); ctx.closePath();
    ctx.fillStyle='#c0392b'; ctx.fill(); ctx.strokeStyle='#7b241c'; ctx.stroke();
    // Shine
    ctx.beginPath(); ctx.arc(x-r*0.3,y-r*0.55,r*0.28,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.fill();
    // Label
    ctx.fillStyle='#fff'; ctx.font=`bold ${Math.max(8,r*0.55)}px sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(label,x,y-r*0.3);
  }
  balloon(80,60,26,'2.4k');
  balloon(165,52,32,'5.1k');
  balloon(235,72,18,'820');
  balloon(48,88,14,'310');
  balloon(130,100,22,'1.7k');
  balloon(195,118,16,'650');
  balloon(275,88,11,'180');
}

function drawDots(ctx, w, h) {
  mapBg(ctx, w, h);
  // Scatter many small dots
  const clusters=[
    [80,55,20,30],[160,55,22,40],[230,75,12,18],[45,90,8,12],[130,105,15,22],[190,120,10,16],[270,90,7,10],[110,70,13,20]
  ];
  clusters.forEach(([cx,cy,spread,count]) => {
    for(let i=0;i<count;i++){
      const angle=Math.random()*Math.PI*2;
      const dist=Math.random()*spread;
      const x=cx+Math.cos(angle)*dist;
      const y=cy+Math.sin(angle)*dist;
      ctx.beginPath(); ctx.arc(x,y,2,0,Math.PI*2);
      ctx.fillStyle='rgba(79,200,247,0.75)'; ctx.fill();
    }
  });
}

// ─── RENDER ──────────────────────────────────────────────────────────────────

function buildCard(opt) {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.id = opt.id;

  const canvas = document.createElement('canvas');
  canvas.className = 'card-canvas';
  const W = 300, H = 190;
  canvas.width = W; canvas.height = H;
  canvas.style.width = '100%'; canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  opt.draw(ctx, W, H);
  card.appendChild(canvas);

  const body = document.createElement('div');
  body.className = 'card-body';
  body.innerHTML = `
    <div class="card-title">${opt.title}</div>
    <div class="card-desc">${opt.desc}</div>
    <div class="tags">${opt.tags.map(t=>`<span class="tag ${t.cls}">${t.label}</span>`).join('')}</div>
  `;
  card.appendChild(body);

  card.addEventListener('click', () => {
    document.querySelectorAll('.card').forEach(c=>c.classList.remove('selected'));
    card.classList.add('selected');
    const lbl = document.getElementById('selectedLabel');
    lbl.textContent = `Selected: ${opt.title}`;
    lbl.classList.add('visible');
  });

  return card;
}

const grid = document.getElementById('grid');
options.forEach(opt => grid.appendChild(buildCard(opt)));
</script>
</body>
</html>
